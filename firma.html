{% extends 'base.html' %}
{% from 'partials.html' import nav %}
{% block content %}
<div class="app-body">
  <div class="page-title"><a href="{{ url_for('home') }}"><i class="bi bi-chevron-left"></i></a><b>GESTIÓN DE FIRMA</b></div>
  <form method="post" class="signature-form">
    <label>FIRMA DIGITAL ACTUAL</label>
    <div class="canvas-wrap">
      <button class="draw-pill" type="button"><i class="bi bi-pencil-fill"></i> Dibujar</button>
      <canvas id="signatureCanvas"></canvas>
      {% if firma_b64 %}<img id="oldSignature" src="data:image/png;base64,{{ firma_b64 }}">{% endif %}
    </div>
    <input type="hidden" name="firma_data" id="firmaData">
    <input type="file" id="uploadSignature" accept="image/*" hidden>
    <div class="two"><button type="button" class="btn soft" onclick="uploadSignature.click()"><i class="bi bi-upload"></i> Subir Imagen</button><a class="btn soft" href="{{ url_for('descargar_firma') }}"><i class="bi bi-download"></i> Descargar Firma</a></div>
    <button type="button" class="btn danger" onclick="clearSignature()"><i class="bi bi-trash"></i> Limpiar Lienzo</button>
    <button class="btn green"><i class="bi bi-folder-check"></i> Guardar Cambios</button>
  </form>
  {{ nav(active) }}
</div>
{% endblock %}
{% block scripts %}<script>initFirma();</script>{% endblock %}
