{% extends 'base.html' %}
{% from 'partials.html' import logo %}
{% block title %}Login - Nisira GCH{% endblock %}
{% block content %}
<div class="login-screen">
  {{ logo() }}
  <form class="login-card card" method="post">
    <h4>Inicia sesión para continuar</h4>
    <label>Usuario</label>
    <input class="input" name="dni" value="11223344" maxlength="8" inputmode="numeric" required>
    <label>Empresa</label>
    <select class="input" name="empresa" required>
      {% for e in empresas %}<option>{{ e.nombre }}</option>{% endfor %}
    </select>
    <label>Contraseña</label>
    <div class="passbox"><input id="pass" class="input" name="password" type="password" value="123456" required><button type="button" onclick="togglePass()"><i class="bi bi-eye-slash"></i></button></div>
    <button class="btn teal" style="margin-top:18px">Iniciar Sesión <i class="bi bi-box-arrow-in-right"></i></button>
    <div class="recover">Olvidaste tu contraseña?</div>
  </form>
  <div class="help">¿Problemas para acceder?<br><b>Contactar a Nisira</b></div>
</div>
{% endblock %}
