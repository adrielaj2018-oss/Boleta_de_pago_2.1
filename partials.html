{% macro logo() %}
<div class="logo">
  <div class="mark"><span class="head h1"></span><span class="head h2"></span><span class="head h3"></span><span class="crown"></span></div>
  <div class="brand">Nisira GCH<small>Gestión del Capital Humano</small></div>
</div>
{% endmacro %}

{% macro nav(active) %}
<nav class="nav">
  <a class="{{ 'active' if active=='home' else '' }}" href="{{ url_for('home') }}"><i class="bi bi-grid-fill"></i><span>Home</span></a>
  <a class="{{ 'active' if active=='asistencia' else '' }}" href="{{ url_for('asistencia') }}"><i class="bi bi-calendar3"></i><span>Asistencia</span></a>
  <a class="{{ 'active' if active=='documentos' else '' }}" href="{{ url_for('documentos') }}"><i class="bi bi-folder-fill"></i><span>Documentos</span></a>
  <a class="{{ 'active' if active=='perfil' else '' }}" href="{{ url_for('perfil') }}"><i class="bi bi-person-circle"></i><span>Perfil</span></a>
</nav>
{% endmacro %}
